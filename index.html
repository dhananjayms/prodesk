<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.zoho.com; connect-src https://*.zoho.com; frame-src https://*.zoho.com;" />
  <title>ProDesk</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: #1a1a2e;
      padding: 6px 12px 0;
      -webkit-app-region: drag;
    }

    #tabs {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .tab {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 500;
      background: #16213e;
      color: #8892a6;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab:hover {
      background: #1f305a;
      color: #c0c8d8;
    }

    .tab.active {
      background: #e94560;
      color: #fff;
    }

    #toolbar-actions {
      display: flex;
      align-items: center;
      padding-bottom: 6px;
      -webkit-app-region: no-drag;
    }

    #open-file-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      background: #16213e;
      color: #8892a6;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #open-file-btn:hover {
      background: #1f305a;
      color: #c0c8d8;
    }

    /* ── Webview container ───────────────────────────────────────────────── */
    #webview-container {
      flex: 1;
      position: relative;
    }

    #webview-container webview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    #webview-container webview.active {
      display: flex;
    }

    /* ── Upload overlay ──────────────────────────────────────────────────── */
    #upload-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 15, 26, 0.92);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    #upload-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a4a;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #upload-message {
      font-size: 16px;
      color: #c0c8d8;
    }

    /* ── Drag-and-drop highlight ─────────────────────────────────────────── */
    #drop-zone {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(233, 69, 96, 0.12);
      border: 3px dashed #e94560;
      z-index: 900;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #e94560;
      pointer-events: none;
    }

    #drop-zone.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <div id="tabs">
        <button class="tab active" data-app="sheet">&#x1F4CA; Zoho Sheet</button>
        <button class="tab" data-app="writer">&#x1F4DD; Zoho Writer</button>
        <button class="tab" data-app="show">&#x1F4BD; Zoho Show</button>
      </div>
      <div id="toolbar-actions">
        <button id="open-file-btn">&#x1F4C2; Open File</button>
      </div>
    </div>

    <!-- Webviews -->
    <div id="webview-container">
      <webview id="sheet" src="https://sheet.zoho.com" partition="persist:zoho" allowpopups class="active"></webview>
      <webview id="writer" src="https://writer.zoho.com" partition="persist:zoho" allowpopups></webview>
      <webview id="show"   src="https://show.zoho.com"   partition="persist:zoho" allowpopups></webview>
    </div>
  </div>

  <!-- Upload overlay with spinner -->
  <div id="upload-overlay">
    <div class="spinner"></div>
    <div id="upload-message">Opening file...</div>
  </div>

  <!-- Drag-and-drop highlight -->
  <div id="drop-zone">Drop file here to open</div>

  <script>
    // Handle Zoho login popups and webview crashes
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('webview').forEach(wv => {
        // Popup handling is done by the main process setWindowOpenHandler.
        // This listener is a fallback to prevent unhandled new-window events.
        wv.addEventListener('new-window', (e) => {
          e.preventDefault();
        });

        // Auto-reload on webview crash
        wv.addEventListener('crashed', () => {
          console.log('webview crashed, reloading...');
          wv.reload();
        });

        wv.addEventListener('destroyed', () => {
          console.log('webview destroyed');
        });
      });
    });
  </script>
  <script src="build/renderer.js"></script>
</body>
</html>
